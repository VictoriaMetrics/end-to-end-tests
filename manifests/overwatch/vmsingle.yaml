apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: overwatch
spec:
  extraArgs:
    maxLabelsPerTimeseries: "50"
  initContainers:
  - name: init-script
    image: busybox:1.36
    command:
      - sh
      - -c
      - rm -rf /victoria-metrics-data/*
    volumeMounts:
      - name: data
        mountPath: /victoria-metrics-data
  resources:
    limits:
      memory: 1500Mi
    requests:
      cpu: 100m
      memory: 250Mi
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi
