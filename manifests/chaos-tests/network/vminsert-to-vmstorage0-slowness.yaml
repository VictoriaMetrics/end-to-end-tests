kind: NetworkChaos
apiVersion: chaos-mesh.org/v1alpha1
metadata:
  name: vminsert-to-vmstorage0-slowness
spec:
  selector:
    namespaces:
      - vm
    labelSelectors:
      app.kubernetes.io/name: vminsert
  mode: all
  action: delay
  duration: 8m
  delay:
    latency: 1s
    correlation: '0'
    jitter: 100ms
  direction: to
  target:
    selector:
      namespaces:
        - vm
      labelSelectors:
        app.kubernetes.io/name: vmstorage
        statefulset.kubernetes.io/pod-name: vmstorage-vm-0
    mode: all
