env:
  RUNNER_IMAGE_REPO: "quay.io/vrutkovs/e2e-runner"
  PROJECT_ID: "victoriametrics-vrutkovsky"

secrets:
  - REGISTRY_SECRET
  - GCP_CREDS

steps:
  # Stage 0: Expose PR labels as an environment variable
  - command: echo $$PULL_REQUEST_LABELS
    plugins:
      - sv-oss/github-pr-labels#v0.0.2:
          publish-env-var: PULL_REQUEST_LABELS

  # Wait for labels to be published to the build environment before evaluating
  # the `if` conditions in subsequent steps.
  - wait

  # Stage 1: Build the test runner Docker image
  - label: ":docker: Build Runner Image"
    key: build-runner-image
    timeout_in_minutes: 30
    retry:
      automatic:
        - exit_status: "*"
          limit: 3
    command: |
      CONFIG_DIR=$(mktemp -d)
      echo "$$REGISTRY_SECRET" > "$$CONFIG_DIR/config.json"
      DOCKER_CONFIG="$$CONFIG_DIR" docker build \
        --cache-from "$RUNNER_IMAGE_REPO:latest" \
        --push \
        -t "$RUNNER_IMAGE_REPO:$$BUILDKITE_BUILD_NUMBER" \
        -f Dockerfile .
  - wait

  # Stage 2: Dynamically upload test steps based on PR labels.
  # Runs directly on the agent (no Docker) so buildkite-agent is accessible.
  # PULL_REQUEST_LABELS is available in the shell environment at this point
  # because the labels plugin in Stage 0 already ran.
  - label: ":pipeline: Queue tests"
    command: python3 .buildkite/generate_pipeline.py | buildkite-agent pipeline upload

  # Always run report deployment even when tests fail
  - wait: ~
    continue_on_failure: true

  # Stage 3: Generate and publish Allure report.
  # Uses the runner image (has gcloud CLI) and installs Node.js 22 for allure CLI.
  - label: ":bar_chart: Deploy Report"
    key: deploy-report
    if: build.branch == "main"
    timeout_in_minutes: 30
    command: |
      # Install Node.js 22 (runner image is Debian-based)
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y --no-install-recommends nodejs

      export GOOGLE_APPLICATION_CREDENTIALS=/buildkite-secrets/gcp-creds.json
      gcloud auth activate-service-account --key-file=/buildkite-secrets/gcp-creds.json

      make deploy-report BUILD_ID=$$BUILDKITE_BUILD_NUMBER
    plugins:
      - docker#v5.0.0:
          image: "$RUNNER_IMAGE_REPO:$$BUILDKITE_BUILD_NUMBER"
          environment:
            - GCP_CREDS
            - BUILDKITE_BUILD_NUMBER
            - BUILDKITE_BRANCH
          volumes:
            - /buildkite-secrets:/buildkite-secrets
            - /tmp:/tmp
